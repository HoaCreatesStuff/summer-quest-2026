<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Completed Stamp QA</title>
  <link rel="stylesheet" href="../../../style.css" />
  <style>
    body { min-height: 100vh; padding: 24px 12px; background: var(--paper); }
    main { width: min(100%, 480px); margin: 0 auto; }
  </style>
</head>
<body>
  <main>
    <div class="quest-grid">
      <button class="quest-card completed" aria-label="Golden Hour, completed">
        <img class="quest-completed-stamp" src="../overlays/completed-stamp-256.png" alt="" />
        <span class="quest-card-content">
          <img class="quest-illustration" src="../icons/01-golden-hour-48.png" alt="" />
          <span class="quest-title"><span class="quest-title-word">Golden</span><span class="quest-title-word">Hour</span></span>
        </span>
      </button>
      <button class="quest-card completed" aria-label="Judgmental Pigeon, completed">
        <img class="quest-completed-stamp" src="../overlays/completed-stamp-256.png" alt="" />
        <span class="quest-card-content">
          <img class="quest-illustration" src="../icons/12-judgmental-pigeon-48.png" alt="" />
          <span class="quest-title"><span class="quest-title-word">Judgmental</span><span class="quest-title-word">Pigeon</span></span>
        </span>
      </button>
      <button class="quest-card completed" aria-label="Street Fashion, completed">
        <img class="quest-completed-stamp" src="../overlays/completed-stamp-256.png" alt="" />
        <span class="quest-card-content">
          <img class="quest-illustration" src="../icons/02-street-fashion-48.png" alt="" />
          <span class="quest-title"><span class="quest-title-word">Street</span><span class="quest-title-word">Fashion</span></span>
        </span>
      </button>
      <button class="quest-card completed final-quest-card" aria-label="Celebrate Together, completed">
        <img class="quest-completed-stamp" src="../overlays/completed-stamp-256.png" alt="" />
        <span class="quest-card-content">
          <img class="quest-illustration" src="../icons/25-celebrate-together-48.png" alt="" />
          <span class="quest-title"><span class="quest-title-word">Celebrate</span><span class="quest-title-word">Together</span></span>
        </span>
      </button>
    </div>
  </main>
</body>
</html>
